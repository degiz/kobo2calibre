[tool.ruff]
line-length = 88
target-version = "py38"

[tool.ruff.lint]
extend-ignore = ["D100", "D104", "E203"]

[tool.ruff.lint.per-file-ignores]
"converter.py" = ["E231"]

[tool.ruff.format]
exclude = [
  ".eggs",
  ".git",
  ".hg",
  ".mypy_cache",
  ".tox",
  ".venv",
  "_build",
  "buck-out",
  "build",
  "dist",
]
